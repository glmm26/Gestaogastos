<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestão de Gastos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section id="splash" class="splash active">
      <div class="logo-wrap">
        <h1>Gestão de Gastos</h1>
        <p>Controle financeiro simples e seguro</p>
        <button id="enter-app">Acessar</button>
      </div>
    </section>

    <main id="auth-screen" class="auth-screen hidden">
      <div class="auth-card">
        <h2>Bem-vindo</h2>
        <p class="subtitle">Cadastre-se ou faça login com autenticação por OTP.</p>

        <div class="tabs">
          <button id="tab-register" class="tab active">Cadastro</button>
          <button id="tab-login" class="tab">Login</button>
        </div>

        <form id="register-form" class="form active">
          <label for="register-email">Email</label>
          <input id="register-email" type="email" required />

          <label for="register-password">Senha</label>
          <input id="register-password" type="password" minlength="6" required />

          <button type="submit">Criar conta</button>
        </form>

        <form id="login-form" class="form">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" required />

          <label for="login-password">Senha</label>
          <input id="login-password" type="password" required />

          <button type="submit">Enviar OTP</button>
        </form>

        <form id="otp-form" class="form hidden">
          <label for="otp-code">Código OTP</label>
          <input id="otp-code" type="text" maxlength="6" required />

          <button type="submit">Validar OTP</button>
        </form>

        <p id="message" class="message"></p>
      </div>
    </main>

    <script src="app.js"></script>
  </body>
</html>
